<div id="reports" class="main-tab hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2><span style="font-size:1.5rem;">📈</span> Data Science & Report Builder</h2>
        <span style="color:var(--text-muted); font-size:0.9rem;">Universal XLSX Generator</span>
    </div>

    <!-- REPORT BUILDER DASHBOARD -->
    <div class="grid-3" style="gap:20px; align-items: stretch;">
        <!-- STEP 1: Select Module -->
        <div class="card pro-glass" style="display:flex; flex-direction:column;">
            <h3 style="color:var(--primary); margin-bottom:15px; border-bottom: 1px solid var(--border); padding-bottom:5px;">1. Select Data Source</h3>
            <select id="report-source-select" style="width:100%; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight:bold; cursor:pointer;" onchange="if(typeof populateReportFields === 'function') populateReportFields()">
                <option value="" disabled selected>-- Choose System Module --</option>
                <option value="docs">📄 Invoices & Commercial Docs</option>
                <option value="expenses">💰 Expense Ledger (PnL)</option>
                <option value="inventory">📦 Stock & Inventory</option>
                <option value="log_containers">🚢 Container Logistics Tracking</option>
            </select>

            <h3 style="color:var(--primary); margin-bottom:10px; border-bottom: 1px solid var(--border); padding-bottom:5px;">2. Date Range Filter</h3>
            <div style="display:flex; gap:10px; margin-bottom: 10px;">
                <input type="date" id="report-date-start" style="width:50%; padding: 10px; border-radius:8px;">
                <input type="date" id="report-date-end" style="width:50%; padding: 10px; border-radius:8px;">
            </div>
            <div style="display:flex; gap:5px; justify-content:center;">
                <button type="button" class="secondary" style="flex:1; font-size:0.75rem; padding: 6px;" onclick="if(typeof setReportDateRange==='function') setReportDateRange('this_month')">This Mth</button>
                <button type="button" class="secondary" style="flex:1; font-size:0.75rem; padding: 6px;" onclick="if(typeof setReportDateRange==='function') setReportDateRange('last_month')">Last Mth</button>
                <button type="button" class="secondary" style="flex:1; font-size:0.75rem; padding: 6px;" onclick="if(typeof setReportDateRange==='function') setReportDateRange('ytd')">YTD</button>
            </div>
        </div>

        <!-- STEP 2: Custom Column Field Selection -->
        <div class="card pro-glass" style="display:flex; flex-direction:column; grid-column: span 2;">
            <div style="display:flex; justify-content:space-between; border-bottom: 1px solid var(--border); padding-bottom:10px; margin-bottom:15px; align-items:center;">
                <h3 style="color:var(--primary); margin:0;">3. Structure Custom Columns</h3>
                <div>
                    <button type="button" class="secondary" style="padding: 4px 12px; font-size: 0.8rem; margin-right: 5px;" onclick="if(typeof toggleAllReportFields === 'function') toggleAllReportFields(true)">Select All</button>
                    <button type="button" class="danger" style="padding: 4px 12px; font-size: 0.8rem; background:transparent; color:var(--danger); border:1px solid var(--danger);" onclick="if(typeof toggleAllReportFields === 'function') toggleAllReportFields(false)">Clear</button>
                </div>
            </div>
            
            <div id="report-fields-container" style="display:flex; flex-wrap:wrap; gap:12px; flex-grow:1; max-height: 250px; overflow-y:auto; padding: 15px; background: rgba(0,0,0,0.02); border-radius:8px; border: 1px inset var(--border);">
                <div style="width:100%; text-align:center; padding: 40px; color: var(--text-muted); font-style:italic;">
                    Please select a Data Source module first to view available columns.
                </div>
            </div>

            <div style="margin-top:20px; text-align:right; border-top: 1px solid var(--border); padding-top: 15px;">
                <button type="button" class="primary" style="padding:15px 30px; font-size: 1.1rem; border-radius: 12px; font-weight: bold; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); cursor:pointer;" onclick="if(typeof executeReportGeneration === 'function') executeReportGeneration()">
                    ⚡ GENERATE EXCEL REPORT
                </button>
            </div>
        </div>
    </div>
</div>
