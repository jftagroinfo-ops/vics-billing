<div id="pricelist" class="main-tab">
    <div class="grid-2">
        <div class="card">
            <h3>🧮 Quote Calculator</h3>
            <div style="margin-bottom: 15px;">
                <label>Commodity / Product Name</label>
                <input type="text" id="quote-comm" placeholder="e.g., Basmati Rice 1121" oninput="calculateQuote()">
            </div>
            
            <div class="grid-2">
                <div>
                    <label>Base Price (INR)</label>
                    <input type="number" id="quote-base-inr" placeholder="Ex-Mill Price" oninput="calculateQuote()">
                </div>
                <div>
                    <label>Target Currency</label>
                    <select id="quote-currency" onchange="calculateQuote()">
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                    </select>
                </div>
            </div>

            <div style="margin-bottom: 15px; background: var(--bg); padding: 10px; border-radius: 4px; border: 1px solid var(--border);">
                <label>Exchange Rate</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="number" step="0.01" id="quote-rate" value="84.00" oninput="calculateQuote()" style="margin: 0;">
                    <button type="button" id="btn-fetch-rate" class="secondary" onclick="fetchLiveRate()" style="white-space: nowrap; margin: 0;">
                        🔄 Fetch Live Rate
                    </button>
                </div>
                <small style="color: var(--text-muted); display: block; margin-top: 5px;">Powered by ExchangeRate-API</small>
            </div>
        </div>

        <div class="card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg);">
            
            <div id="quote-card-element" style="background: var(--surface); padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; border-top: 5px solid var(--primary);">
                <div style="font-size: 2rem; margin-bottom: 10px;">📄</div>
                <h4 style="margin-bottom: 5px; color: var(--text-muted);">JFT AGRO OVERSEAS</h4>
                <div id="qc-date" style="font-size: 0.8rem; color: #999; margin-bottom: 20px;">08/03/2026</div>
                
                <h2 id="qc-comm" style="margin-bottom: 20px; color: var(--primary);">Product Name</h2>
                
                <div style="font-size: 3rem; font-weight: bold; color: var(--text);">
                    <span id="qc-curr" style="font-size: 1.5rem; vertical-align: middle;">USD</span>
                    <span id="qc-price">0.00</span>
                </div>
                <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 10px;">per Metric Ton (MT)</div>
            </div>

            <button onclick="convertQuoteToProforma()" class="secondary" style="margin-top: 20px; width: 100%; max-width: 350px; border: 2px dashed var(--primary); background: rgba(59, 130, 246, 0.05); color: var(--primary);">
                🚀 Convert to Proforma Invoice
            </button>
            
            <button onclick="shareQuoteWhatsApp()" class="secondary" style="margin-top: 10px; width: 100%; max-width: 350px; background: #25D366; color: white; border: none;">
                💬 Share via WhatsApp
            </button>

            <button onclick="generateQuoteImage()" style="margin-top: 10px; width: 100%; max-width: 350px; background: var(--text);">
                📸 Download as Image
            </button>
        </div>
    </div>
</div>
