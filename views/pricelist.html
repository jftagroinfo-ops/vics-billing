<!-- PRICELIST MODULE: Consolidated into Costing Calc → Quick Quote tab -->
<!-- This page now shows a redirect card if loaded directly. -->
<div id="pricelist" class="main-tab">
    <div class="card" style="max-width:600px; margin:60px auto; text-align:center; padding:40px; border:2px dashed var(--primary); border-radius:20px;">
        <div style="font-size:3.5rem; margin-bottom:20px;">💱</div>
        <h2 style="margin:0 0 10px 0; color:var(--primary);">Quick Quote has moved</h2>
        <p style="color:var(--text-muted); margin:0 0 25px 0; font-size:1rem; line-height:1.6;">
            The Price List &amp; Quick Quote tool is now part of <strong>Costing Calc</strong> as the
            <strong>Quick Quote (INR → Export)</strong> sub-tab. This keeps all pricing tools in one place
            alongside the full costing calculator.
        </p>
        <button class="primary" style="padding:14px 36px; border-radius:12px; font-size:1rem; font-weight:bold;"
            onclick="showTab('costing'); setTimeout(()=>{ if(typeof switchCostTab==='function') switchCostTab('quote'); }, 200);">
            ⚡ Open Quick Quote →
        </button>
        <p style="margin:20px 0 0 0; font-size:0.75rem; color:var(--text-muted);">You can also press <strong>Ctrl+K</strong> and type "quick quote" to jump there instantly.</p>
    </div>
</div>
